<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentinel — AI Assistant</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="chat-page-body">

  <div id="chatKeyModal" class="modal-overlay" style="display:none;" role="dialog" aria-modal="true">
    <div class="modal-box">
      <div class="modal-icon">
        <svg viewBox="0 0 24 24"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0 3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
      </div>
      <h2 class="modal-title">API Key Required</h2>
      <p class="modal-desc">Enter your <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI API key</a> to use the assistant.</p>
      <input type="password" id="chatKeyInput" class="modal-input" placeholder="AIza…" autocomplete="off" spellcheck="false" aria-label="Google AI API Key" />
      <button class="modal-btn" id="chatKeySave">Save and continue</button>
      <p id="chatKeyError" class="modal-error"></p>
    </div>
  </div>


  <div class="chat-page-layout">

    <div class="chat-page-header">
      <div class="chat-header-info">
        <div class="chat-page-avatar" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        </div>
        <div>
          <div class="chat-page-title">Sentinel Assistant</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:.5rem;">
        <a href="index.html" class="btn-back-dash">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          Dashboard
        </a>
      </div>
    </div>

    <div id="chatMessages" class="chat-page-messages" role="log" aria-live="polite"></div>

    <div class="chat-page-suggestions" id="chatSuggestions">
      <button class="suggestion-chip" data-text="How much did I spend this month?">This month's spending</button>
      <button class="suggestion-chip" data-text="What are my top 5 expenses?">Top expenses</button>
      <button class="suggestion-chip" data-text="Check my savings goal progress">Goal progress</button>
      <button class="suggestion-chip" data-text="Analyse my financial health">Financial health</button>
    </div>


    <div class="chat-page-footer">
      <input
        type="text"
        id="chatInput"
        class="chat-page-input"
        placeholder="Ask anything about your finances…"
        autocomplete="off"
        maxlength="500"
        aria-label="Message for the assistant"
      />
      <button class="chat-page-send" id="chatBtnSend" aria-label="Send">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>

  </div>

  <script src="api.js"></script>
  <script>
    const TOOL_LABELS = {
      analyze_spending:     "Analysing spending…",
      get_category_trend:   "Fetching category trend…",
      get_top_expenses:     "Finding top expenses…",
      check_savings_goal:   "Checking savings goal…",
      get_financial_health: "Evaluating financial health…",
    };

    const msgsEl   = document.getElementById("chatMessages");
    const inputEl  = document.getElementById("chatInput");
    const sendBtn  = document.getElementById("chatBtnSend");
    function addBubble(text, role) {
      const div = document.createElement("div");
      div.className = `chat-bubble chat-bubble--${role === "user" ? "user" : "agent"}`;
      if (text) {
        div.textContent = text;
      } else {
        div.classList.add("chat-typing");
        div.innerHTML = "<span></span><span></span><span></span>";
      }
      msgsEl.appendChild(div);
      msgsEl.scrollTop = msgsEl.scrollHeight;
      return div;
    }

    function addToolIndicator() {
      const div = document.createElement("div");
      div.className = "chat-tool-indicator chat-tool-pending";
      div.innerHTML = `<span style="font-size:.8rem">⚙</span><span class="tool-text">Thinking…</span>`;
      msgsEl.appendChild(div);
      msgsEl.scrollTop = msgsEl.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      document.getElementById("chatSuggestions").style.display = "none";
      inputEl.value = "";
      inputEl.disabled = true;
      sendBtn.disabled = true;

      addBubble(text, "user");
      const waiting   = addBubble("", "agent");
      const indicator = addToolIndicator();

      try {
        const data = await sendChatMessage(text, getUserId());

        if (data.tool_used) {
          const span = indicator.querySelector(".tool-text");
          if (span) span.textContent = TOOL_LABELS[data.tool_used] || "Database queried.";
          indicator.classList.remove("chat-tool-pending");
          indicator.classList.add("chat-tool-done");
          setTimeout(() => { indicator.style.maxHeight = "0"; indicator.style.opacity = "0"; }, 2000);
        } else {
          indicator.remove();
        }

        waiting.classList.remove("chat-typing");
        waiting.innerHTML = "";
        waiting.textContent = data.response || "No response from the agent.";

      } catch (err) {
        indicator.remove();
        waiting.classList.remove("chat-typing");
        waiting.classList.add("chat-bubble--error");
        waiting.textContent = `⚠ Error: ${err.message}`;
      } finally {
        inputEl.disabled = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

    document.querySelectorAll(".suggestion-chip").forEach(chip => {
      chip.addEventListener("click", () => { inputEl.value = chip.dataset.text; sendMessage(); });
    });

    function showWelcome() {
      setTimeout(() => {
        addBubble("👋🏻 Hi! I'm your Sentinel financial assistant. I can query your spending, analyse categories, review your savings goal, and assess your financial health. What would you like to know?", "agent");
      }, 300);
    }

    function initChat() {
      if (!localStorage.getItem("sfe_api_key")) {
        document.getElementById("chatKeyModal").style.display = "flex";
      } else {
        showWelcome();
      }
    }

    document.getElementById("chatKeySave").addEventListener("click", () => {
      const key = document.getElementById("chatKeyInput").value.trim();
      if (!key) { document.getElementById("chatKeyError").textContent = "Please enter a valid API key."; return; }
      localStorage.setItem("sfe_api_key", key);
      document.getElementById("chatKeyModal").style.display = "none";
      showWelcome();
    });

    document.getElementById("chatKeyInput").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("chatKeySave").click();
    });

    initChat();
  </script>

</body>
</html>
